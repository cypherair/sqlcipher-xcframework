name: PR Checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-validate:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Build SQLCipher XCFramework
        run: ./scripts/build-sqlcipher-xcframework.sh
      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sqlcipher-xcframework-${{ github.sha }}
          path: |
            build/SQLCipher.xcframework.zip
            build/SQLCipher.xcframework.sha256
            build/SQLCipher.arm64e-build-manifest.json
            build/SQLCipher-PrivacyInfo.xcprivacy
          if-no-files-found: error
          retention-days: 5

